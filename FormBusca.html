<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
      --mono:'JetBrains Mono',monospace;
      --navy:#25419A;--brand-red:#C62025;
      --red:#DC2626;--red-bg:#FEF2F2;
      --bg:#F4F6F9;--surface:#fff;
      --border:#E5E7EB;--border-def:#D1D5DB;
      --text:#111827;--text-body:#374151;--text-muted:#6B7280;--text-faint:#9CA3AF;
      --navy-50:#EEF2FF;--r:8px;--r-sm:6px;--ease:cubic-bezier(.4,0,.2,1)
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:13px;background:var(--bg);padding:14px;
         display:flex;flex-direction:column;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:9px;height:9px}
    ::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:6px}

    .titulo{background:var(--navy);color:#fff;padding:11px 14px;border-radius:var(--r-sm);
            font-size:13px;font-weight:700;margin-bottom:10px;flex-shrink:0}

    .barra{display:flex;gap:8px;margin-bottom:8px;flex-shrink:0}
    input[type=text]{flex:1;padding:9px 11px;border:1px solid var(--border-def);
      border-radius:var(--r-sm);font-size:13px;background:var(--surface);font-family:var(--font)}
    input[type=text]:focus{outline:none;border-color:var(--navy);
      box-shadow:0 0 0 3px rgba(37,65,154,.12)}
    button{padding:9px 15px;border:none;border-radius:var(--r-sm);font-size:12px;
           font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font);
           transition:opacity .15s var(--ease)}
    #btnBuscar{background:var(--navy);color:#fff}
    #btnBuscar:hover{opacity:.88}
    #btnFechar{background:var(--border);color:var(--text-body);transition:background .15s}
    #btnFechar:hover{background:var(--border-def)}

    #msg{font-size:12px;display:none;padding:7px 10px;
         border-radius:var(--r-sm);margin-bottom:8px;flex-shrink:0}
    .msg-erro{background:var(--red-bg);color:var(--red);border:1px solid #FECACA}

    .area{flex:1;overflow:hidden;display:flex;flex-direction:column}
    .contador{font-size:11px;color:var(--text-muted);margin-bottom:5px;flex-shrink:0}
    .scroll{flex:1;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-sm);
            background:var(--surface)}
    .spinner{display:none;text-align:center;color:var(--text-muted);padding:20px;font-size:12px}
    .dica{font-size:10px;color:var(--text-faint);margin-top:5px;text-align:center;
          font-style:italic;flex-shrink:0}

    table{width:100%;border-collapse:collapse;font-size:11px}
    thead th{background:var(--navy);color:#fff;padding:7px 8px;text-align:left;
             position:sticky;top:0;z-index:1;font-size:10px;font-weight:700}
    tbody tr:hover td{background:var(--navy-50)}
    tbody tr.nav{cursor:pointer}
    td{padding:5px 8px;border-bottom:1px solid #F3F4F6;vertical-align:middle}

    .badge{display:inline-block;padding:2px 7px;border-radius:10px;
           font-size:10px;font-weight:700;white-space:nowrap}
    .b-p  {background:#DBEAFE;color:#1D4ED8}
    .b-d  {background:#DCFCE7;color:#15803D}
    .b-v  {background:#FEF3C7;color:#92400E}
    .b-at {background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0}
    .b-hi {background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE}
    .val  {text-align:right;font-family:var(--mono)}
  </style>
</head>
<body>
<div id="cdv-nav-webapp" style="display:none;background:#0E1B30;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;align-items:center;justify-content:space-between;font-family:Arial,sans-serif"><a href="?page=Index" style="color:#9CC1FF;text-decoration:none;font-weight:bold">🏠 Menu Principal</a><span style="opacity:.6">📦 Devoluções · Transben</span></div>
<script>
  // Só aparece quando aberto pelo link do Web App (doGet) — em diálogos do
  // Sheets, google.script.url não funciona e a barra continua oculta, mantendo
  // o diálogo idêntico ao original.
  try {
    google.script.run
      .withSuccessHandler(function(_execUrl) {
        if (!_execUrl) return;
        var _nav = document.getElementById('cdv-nav-webapp');
        if (_nav) { _nav.style.display = 'flex'; var _a = _nav.querySelector('a[href]'); if (_a) _a.href = _execUrl + '?page=Index'; }
        // No modo Web App, Fechar/Cancelar volta ao menu em vez de fechar a janela
        try { google.script.host.close = function(){ window.top.location.href = _execUrl + '?page=Index'; }; } catch(_c) {}
      })
      ._getWebAppExecUrl();
  } catch (_e) {}
</script>


<div class="titulo">🔍 Buscar NF / Fornecedor / Produto</div>

<div class="barra">
  <input type="text" id="termo"
         placeholder="Digite NF, fornecedor ou descrição..."
         onkeydown="if(event.key==='Enter')buscar()">
  <button id="btnBuscar" onclick="buscar()">Buscar</button>
  <button id="btnFechar" onclick="google.script.host.close()">✖</button>
</div>

<div id="msg"></div>

<div class="area" id="area" style="display:none">
  <div class="contador" id="contador"></div>
  <div class="scroll">
    <div class="spinner" id="spinner">⏳ Buscando...</div>
    <table id="tabela" style="display:none">
      <thead>
        <tr>
          <th></th>
          <th>NF</th>
          <th>Fornecedor</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Data</th>
          <th style="text-align:right">Valor</th>
          <th>Arquivado em</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="dica">💡 Clique em itens ativos para navegar até a linha na planilha</div>
</div>

<script>
var badges = {
  'Pendente':  '<span class="badge b-p">Pendente</span>',
  'Devolvido': '<span class="badge b-d">Devolvido</span>',
  'Venda':     '<span class="badge b-v">Venda</span>'
};

function buscar() {
  var termo = document.getElementById('termo').value.trim();
  if (!termo) { erro('Digite um termo para buscar.'); return; }

  document.getElementById('msg').style.display  = 'none';
  document.getElementById('area').style.display = 'flex';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('tabela').style.display  = 'none';
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('contador').textContent  = '';
  document.getElementById('btnBuscar').disabled = true;

  google.script.run
    .withSuccessHandler(function(resp) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnBuscar').disabled = false;
      var r = JSON.parse(resp);
      if (r.erro) { erro(r.erro); document.getElementById('area').style.display = 'none'; return; }
      render(r.resultados);
    })
    .withFailureHandler(function(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnBuscar').disabled = false;
      erro(e.message);
    })
    .executarBusca(termo);
}

function render(lista) {
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  lista.forEach(function(it) {
    var tr = document.createElement('tr');
    var isAtivo = it.origem === 'ativo';
    if (isAtivo) tr.className = 'nav';

    var origemBadge = isAtivo
      ? '<span class="badge b-at">Ativo</span>'
      : '<span class="badge b-hi">Histórico</span>';

    tr.innerHTML =
      '<td>' + origemBadge + '</td>' +
      '<td><b>' + esc(it.nf || it.nfd) + '</b></td>' +
      '<td>' + esc(it.forn) + '</td>' +
      '<td>' + esc(it.desc) + '</td>' +
      '<td>' + (badges[it.status] || esc(it.status)) + '</td>' +
      '<td style="white-space:nowrap">' + esc(it.data) + '</td>' +
      '<td class="val">' + fmtVal(it.valor) + '</td>' +
      '<td style="white-space:nowrap;color:#9CA3AF;font-size:10px">' + esc(it.dataArq) + '</td>';

    if (isAtivo) {
      (function(aba, linha) {
        tr.onclick = function() { google.script.run.navegarParaLinha(aba, linha); };
      })(it.aba, it.linha);
    }

    tbody.appendChild(tr);
  });

  document.getElementById('tabela').style.display = 'table';
  document.getElementById('contador').textContent =
    lista.length + ' resultado(s) — ativos e histórico';
}

function erro(txt) {
  var el = document.getElementById('msg');
  el.className = 'msg-erro';
  el.textContent = '❌ ' + txt;
  el.style.display = 'block';
}

function fmtVal(v) {
  return v > 0 ? 'R$ ' + v.toFixed(2).replace('.', ',') : '—';
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('termo').focus();
</script>
</body>
</html>
