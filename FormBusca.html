<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:13px;background:var(--bg);padding:14px;
         display:flex;flex-direction:column;height:100vh;overflow:hidden}
    ::-webkit-scrollbar{width:7px;height:7px}
    ::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:8px}

    /* ── Header ── */
    .titulo{
      background:linear-gradient(135deg,var(--ink) 0%,var(--navy) 100%);
      color:#fff;padding:12px 14px;border-radius:var(--r-sm);
      font-size:13px;font-weight:800;margin-bottom:12px;flex-shrink:0;
      box-shadow:0 3px 12px rgba(14,21,33,.25)
    }

    .barra{display:flex;gap:8px;margin-bottom:9px;flex-shrink:0}
    input[type=text]{
      flex:1;padding:9px 11px;border:1.5px solid var(--border-def);
      border-radius:var(--r-sm);font-size:13px;background:var(--input-bg);
      font-family:var(--font);color:var(--text);
      transition:border-color .15s,box-shadow .15s,background .15s
    }
    input[type=text]:focus{outline:none;border-color:var(--navy);background:var(--surface);box-shadow:0 0 0 3px rgba(31,64,128,.12)}
    button{padding:9px 15px;border:none;border-radius:var(--r-sm);font-size:12px;
           font-weight:700;cursor:pointer;white-space:nowrap;font-family:var(--font);
           transition:opacity .15s var(--ease);display:inline-flex;align-items:center;gap:5px}
    #btnBuscar{background:linear-gradient(135deg,var(--navy-800),var(--navy));color:#fff;box-shadow:0 2px 8px rgba(31,64,128,.30)}
    #btnBuscar:hover{opacity:.9}
    #btnFechar{background:var(--surface);border:1px solid var(--border-def);color:var(--text-body);transition:background .15s}
    #btnFechar:hover{background:var(--slate-100)}

    #msg{font-size:12px;display:none;padding:8px 11px;
         border-radius:var(--r-sm);margin-bottom:8px;flex-shrink:0}
    .msg-erro{background:var(--red-bg);color:var(--red);border:1px solid #FECACA}

    .area{flex:1;overflow:hidden;display:flex;flex-direction:column}
    .contador{font-size:11px;color:var(--text-muted);margin-bottom:5px;flex-shrink:0}
    .scroll{flex:1;overflow-y:auto;border:1.5px solid var(--border-def);border-radius:var(--r-sm);
            background:var(--surface);box-shadow:var(--sh)}
    .spinner{display:none;text-align:center;color:var(--text-muted);padding:20px;font-size:12px}
    .dica{font-size:10px;color:var(--text-faint);margin-top:6px;text-align:center;
          font-style:italic;flex-shrink:0}

    table{width:100%;border-collapse:collapse;font-size:11px}
    thead th{background:linear-gradient(135deg,var(--navy-800),var(--navy));color:#fff;padding:7px 9px;text-align:left;
             position:sticky;top:0;z-index:1;font-size:10px;font-weight:700}
    tbody tr:hover td{background:var(--navy-50)}
    tbody tr.nav{cursor:pointer}
    td{padding:5px 9px;border-bottom:1px solid var(--border);vertical-align:middle}

    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
    .b-p  {background:#DBEAFE;color:#1D4ED8}
    .b-d  {background:#DCFCE7;color:#15803D}
    .b-v  {background:#FEF3C7;color:#92400E}
    .b-at {background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0}
    .b-hi {background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE}
    .val  {text-align:right;font-family:var(--mono)}
  </style>
  <style id="cdv-v10">
:root{--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--ink:#06101E;--brand-amber:#E8A020;--slate-100:#ECF1FA;--sh:0 2px 8px rgba(6,14,30,.08),0 1px 3px rgba(6,14,30,.05);--sh-md:0 6px 22px rgba(6,14,30,.10),0 2px 6px rgba(6,14,30,.06);--ease:cubic-bezier(.4,0,.2,1);--navy:#1C45D0;--navy-800:#1535A5;--navy-d:#142DB8;--teal:#0891B2;--red:#DC2626;--green:#16A34A;--amber:#D97706;--bg:#ECF1FA;--surface:#FFFFFF;--input-bg:#F4F7FE;--border:#DDE6F4;--border-def:#BACADE;--text:#07162A;--text-body:#29394F;--text-muted:#53708C;--text-faint:#8AA3BF;--text-sm:var(--text-muted);--navy-50:#EDF3FF;--r:12px;--r-sm:9px;--green-bg:#EDFCF2;--red-bg:#FFF1F1;--amber-bg:#FFF7E0;--brand-red:#DC2626}
body.dark{--bg:#060C19;--surface:#0B1522;--input-bg:#060C19;--border:#172740;--border-def:#1D3154;--text:#E6EDF9;--text-body:#95AFCC;--text-muted:#567090;--text-faint:#2E4562;--navy-50:#112036;--green-bg:#022C1A;--red-bg:#2D0A0A;--amber-bg:#1F1100}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
body{background:var(--bg);color:var(--text);font-family:var(--font);transition:background .22s,color .22s}
thead tr{background:linear-gradient(135deg,#06101E 0%,var(--navy) 100%)}
thead th{color:#fff;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--navy-50)}
input,select,textarea{background:var(--input-bg);border-radius:var(--r-sm);transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(28,69,208,.12);outline:none}
button{font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .12s,opacity .12s}
.msg-ok,.msg-erro,.msg-aviso,#msg{animation:fadeIn .2s both;border-radius:var(--r-sm)}
.spinner{color:var(--navy)}
.badge{animation:scaleIn .18s both}
#btnBuscar{background:linear-gradient(135deg,var(--navy-800),var(--navy));
  box-shadow:0 2px 10px rgba(28,69,208,.28)}
#btnBuscar:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(28,69,208,.35);opacity:1}
#btnFechar{background:transparent;border:1.5px solid var(--border-def);color:var(--text-muted);
  transition:border-color .15s,color .15s,background .15s}
#btnFechar:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-50)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--navy)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
<div id="cdv-nav-webapp" style="display:none;background:#0E1B30;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;align-items:center;justify-content:space-between;font-family:Arial,sans-serif"><a href="?page=Index" style="color:#9CC1FF;text-decoration:none;font-weight:bold">🏠 Menu Principal</a><span style="opacity:.6">📦 Devoluções · Transben</span></div>
<script>
  // Só aparece quando aberto pelo link do Web App (doGet) — em diálogos do
  // Sheets, google.script.url não funciona e a barra continua oculta, mantendo
  // o diálogo idêntico ao original.
  try {
    google.script.run
      .withSuccessHandler(function(_execUrl) {
        if (!_execUrl) return;
        var _nav = document.getElementById('cdv-nav-webapp');
        if (_nav) { _nav.style.display = 'flex'; var _a = _nav.querySelector('a[href]'); if (_a) _a.href = _execUrl + '?page=Index'; }
        // No modo Web App, Fechar/Cancelar volta ao menu em vez de fechar a janela
        try { google.script.host.close = function(){ window.top.location.href = _execUrl + '?page=Index'; }; } catch(_c) {}
      })
      ._getWebAppExecUrl();
  } catch (_e) {}
</script>


<div class="titulo">🔍 Buscar NF / Fornecedor / Produto</div>

<div class="barra">
  <input type="text" id="termo"
         placeholder="Digite NF, fornecedor ou descrição..."
         onkeydown="if(event.key==='Enter')buscar()">
  <button id="btnBuscar" onclick="buscar()">Buscar</button>
  <button id="btnFechar" onclick="google.script.host.close()">✖</button>
</div>

<div id="msg"></div>

<div class="area" id="area" style="display:none">
  <div class="contador" id="contador"></div>
  <div class="scroll">
    <div class="spinner" id="spinner">⏳ Buscando...</div>
    <table id="tabela" style="display:none">
      <thead>
        <tr>
          <th></th>
          <th>NF</th>
          <th>Fornecedor</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Data</th>
          <th style="text-align:right">Valor</th>
          <th>Arquivado em</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="dica">💡 Clique em itens ativos para navegar até a linha na planilha</div>
</div>

<script>
var badges = {
  'Pendente':  '<span class="badge b-p">Pendente</span>',
  'Devolvido': '<span class="badge b-d">Devolvido</span>',
  'Venda':     '<span class="badge b-v">Venda</span>'
};

function buscar() {
  var termo = document.getElementById('termo').value.trim();
  if (!termo) { erro('Digite um termo para buscar.'); return; }

  document.getElementById('msg').style.display  = 'none';
  document.getElementById('area').style.display = 'flex';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('tabela').style.display  = 'none';
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('contador').textContent  = '';
  document.getElementById('btnBuscar').disabled = true;

  google.script.run
    .withSuccessHandler(function(resp) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnBuscar').disabled = false;
      var r = JSON.parse(resp);
      if (r.erro) { erro(r.erro); document.getElementById('area').style.display = 'none'; return; }
      render(r.resultados);
    })
    .withFailureHandler(function(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnBuscar').disabled = false;
      erro(e.message);
    })
    .executarBusca(termo);
}

function render(lista) {
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  lista.forEach(function(it) {
    var tr = document.createElement('tr');
    var isAtivo = it.origem === 'ativo';
    if (isAtivo) tr.className = 'nav';

    var origemBadge = isAtivo
      ? '<span class="badge b-at">Ativo</span>'
      : '<span class="badge b-hi">Histórico</span>';

    tr.innerHTML =
      '<td>' + origemBadge + '</td>' +
      '<td><b>' + esc(it.nf || it.nfd) + '</b></td>' +
      '<td>' + esc(it.forn) + '</td>' +
      '<td>' + esc(it.desc) + '</td>' +
      '<td>' + (badges[it.status] || esc(it.status)) + '</td>' +
      '<td style="white-space:nowrap">' + esc(it.data) + '</td>' +
      '<td class="val">' + fmtVal(it.valor) + '</td>' +
      '<td style="white-space:nowrap;color:#9CA3AF;font-size:10px">' + esc(it.dataArq) + '</td>';

    if (isAtivo) {
      (function(aba, linha) {
        tr.onclick = function() { google.script.run.navegarParaLinha(aba, linha); };
      })(it.aba, it.linha);
    }

    tbody.appendChild(tr);
  });

  document.getElementById('tabela').style.display = 'table';
  document.getElementById('contador').textContent =
    lista.length + ' resultado(s) — ativos e histórico';
}

function erro(txt) {
  var el = document.getElementById('msg');
  el.className = 'msg-erro';
  el.textContent = '❌ ' + txt;
  el.style.display = 'block';
}

function fmtVal(v) {
  return v > 0 ? 'R$ ' + v.toFixed(2).replace('.', ',') : '—';
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('termo').focus();
(function(){ try { if(localStorage.getItem('cdv_dark_mode')==='1') document.body.classList.add('dark'); }catch(_){} })();
// relay hotkeys → Index.html
document.addEventListener('keydown', function(e) {
  var ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key === 'k') { e.preventDefault(); try { window.parent.postMessage({cdvKey:{ctrlKey:e.ctrlKey,metaKey:e.metaKey,altKey:false,key:'k'}}, '*'); } catch(_) {} return; }
  if (e.altKey && !ctrl && '123456'.indexOf(e.key) >= 0) { e.preventDefault(); try { window.parent.postMessage({cdvKey:{ctrlKey:false,metaKey:false,altKey:true,key:e.key}}, '*'); } catch(_) {} }
});

window.addEventListener('message', function(e) {
  if (!e.data || !e.data.cdvAutoSearch) return;
  var inp = document.getElementById('termo');
  if (!inp) return;
  inp.value = String(e.data.cdvAutoSearch);
  buscar();
});
// ── Enforcement de permissões ───────────────────────────────
try {
  google.script.run
    .withSuccessHandler(function(r){
      try {
        var p = JSON.parse(r);
        if (!p.admin && (!p.modulos || p.modulos.length === 0)) {
          document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:12px;font-family:inherit">'
            + '<div style="font-size:36px">🔒</div>'
            + '<div style="font-size:16px;font-weight:700;color:#07162A">Acesso Negado</div>'
            + '<div style="font-size:13px;color:#53708C;text-align:center;max-width:300px">Você não tem permissão para acessar este módulo. Contate o administrador.</div>'
            + '</div>';
        }
      } catch(_){}
    })
    .obterPermissoesUsuario('');
} catch(_) {}
</script>
</body>
</html>
