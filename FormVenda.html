<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
      --navy:#25419A;--brand-red:#C62025;
      --amber:#D97706;--amber-bg:#FEF3C7;
      --green:#059669;--green-bg:#ECFDF5;
      --red:#DC2626;--red-bg:#FEF2F2;
      --bg:#F4F6F9;--surface:#fff;
      --border:#E5E7EB;--border-def:#D1D5DB;
      --text:#111827;--text-body:#374151;--text-muted:#6B7280;
      --r:8px;--r-sm:6px;--ease:cubic-bezier(.4,0,.2,1)
    }
    body.dark{--bg:#0F172A;--surface:#1E293B;--border:#334155;--border-def:#475569;
      --text:#F1F5F9;--text-body:#CBD5E1;--text-muted:#94A3B8;}
    body.dark textarea{background:#0F172A!important;color:#F1F5F9;border-color:#475569}
    body.dark .info{background:#1A2744;border-left-color:#F59E0B;color:#CBD5E1}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:13px;background:var(--bg);padding:16px}
    ::-webkit-scrollbar{width:9px;height:9px}
    ::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:6px}
    .titulo{background:var(--navy);color:#fff;text-align:center;padding:12px;
            border-radius:var(--r-sm);font-size:15px;font-weight:700;margin-bottom:14px}
    .info{background:var(--amber-bg);border-left:4px solid var(--amber);padding:9px 12px;
          border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12px;color:#333;
          margin-bottom:12px;line-height:1.5}
    .campo{margin-bottom:12px}
    label{display:block;font-weight:700;color:#333;margin-bottom:4px}
    textarea{width:100%;padding:8px 10px;border:1px solid var(--border-def);
             border-radius:var(--r-sm);font-size:13px;resize:vertical;font-family:var(--font)}
    textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(37,65,154,.12)}
    .botoes{display:flex;gap:8px;margin-top:14px}
    button{flex:1;padding:9px;border:none;border-radius:var(--r-sm);font-size:13px;
           font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s var(--ease)}
    #btnBaixa   {background:var(--amber);color:#fff}
    #btnBaixa:hover{opacity:.88}
    #btnBaixa:disabled{opacity:.45;cursor:not-allowed}
    #btnCancelar{background:#E5E7EB;color:var(--text-body);transition:background .15s}
    #btnCancelar:hover{background:var(--border-def)}
    #msg{margin-top:10px;padding:9px 11px;border-radius:var(--r-sm);font-size:12px;
         display:none;line-height:1.5}
    .msg-ok  {background:var(--green-bg);color:#2e7d32;border:1px solid #a5d6a7}
    .msg-erro{background:var(--red-bg);color:#c62828;border:1px solid #ef9a9a}
    .link-pdf{display:inline-block;margin-top:6px;background:var(--amber);color:#fff;
              padding:5px 10px;border-radius:var(--r-sm);text-decoration:none;
              font-weight:700;font-size:12px}
    .link-doc{display:inline-block;margin-top:6px;margin-left:6px;background:var(--navy);color:#fff;
              padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;border:none;
              font-weight:700;font-size:12px;font-family:var(--font)}
    .spinner{display:none;text-align:center;color:#666;margin-top:8px;font-size:12px}
  </style>
</head>
<body>
<div id="cdv-nav-webapp" style="display:none;background:#0E1B30;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;align-items:center;justify-content:space-between;font-family:Arial,sans-serif"><a href="?page=Index" style="color:#9CC1FF;text-decoration:none;font-weight:bold">🏠 Menu Principal</a><span style="opacity:.6">📦 Devoluções · Transben</span></div>
<script>
  // Só aparece quando aberto pelo link do Web App (doGet) — em diálogos do
  // Sheets, google.script.url não funciona e a barra continua oculta, mantendo
  // o diálogo idêntico ao original.
  try {
    google.script.run
      .withSuccessHandler(function(_execUrl) {
        if (!_execUrl) return;
        var _nav = document.getElementById('cdv-nav-webapp');
        if (_nav) { _nav.style.display = 'flex'; var _a = _nav.querySelector('a[href]'); if (_a) _a.href = _execUrl + '?page=Index'; }
        // No modo Web App, Fechar/Cancelar volta ao menu em vez de fechar a janela
        try { google.script.host.close = function(){ window.top.location.href = _execUrl + '?page=Index'; }; } catch(_c) {}
      })
      ._getWebAppExecUrl();
  } catch (_e) {}
</script>


<div class="titulo">🛒 Baixa de Mercadorias para Venda</div>

<div class="info">
  ℹ️ Digite os números das NFs com status <strong>Pendente</strong> que serão enviadas para venda.<br>
  Separe por vírgula ou uma por linha.<br>
  O status será alterado automaticamente para <strong>Venda</strong> e um relatório PDF será gerado.
</div>

<div class="campo">
  <label>Números das NFs</label>
  <textarea id="nfs" rows="5" placeholder="Ex:&#10;123456&#10;789012&#10;ou: 123456, 789012"></textarea>
</div>

<div class="botoes">
  <button id="btnBaixa"    onclick="darBaixa()">🛒 Dar Baixa para Venda</button>
  <button id="btnCancelar" onclick="google.script.host.close()">✖ Cancelar</button>
</div>

<div class="spinner" id="spinner">⏳ Processando, aguarde...</div>
<div id="msg"></div>

<script>
  function darBaixa() {
    var nfs = document.getElementById('nfs').value.trim();
    if (!nfs) {
      mostrar('erro', '❌ Informe ao menos um número de NF.');
      return;
    }

    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btnBaixa').disabled = true;
    document.getElementById('msg').style.display = 'none';

    google.script.run
      .withSuccessHandler(function(resp) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('btnBaixa').disabled = false;
        var r = JSON.parse(resp);
        if (r.sucesso) {
          var html = r.sucesso.replace(/\n/g, '<br>');
          if (r.urlPdf) {
            html += '<br><a class="link-pdf" href="' + r.urlPdf + '" target="_blank">📥 Abrir Relatório no Drive</a>';
          }
          if (r.itens && r.itens.length) {
            html += '<br><button class="link-doc" onclick="gerarDocVenda()">🖨️ Abrir Doc. Carga</button>';
            _itensVenda = r.itens;
          }
          mostrarHtml('ok', html);
          document.getElementById('nfs').value = '';
          if (r.itens && r.itens.length) gerarDocVenda();
        } else {
          mostrar('erro', '❌ ' + r.erro);
        }
      })
      .withFailureHandler(function(e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('btnBaixa').disabled = false;
        mostrar('erro', '❌ Erro: ' + e.message);
      })
      .executarBaixaVenda(nfs);
  }

  function mostrar(tipo, texto) {
    var el = document.getElementById('msg');
    el.className = 'msg-' + tipo;
    el.textContent = texto;
    el.style.display = 'block';
  }

  function mostrarHtml(tipo, html) {
    var el = document.getElementById('msg');
    el.className = 'msg-' + tipo;
    el.innerHTML = html;
    el.style.display = 'block';
  }

  var _itensVenda = [];

  function gerarDocVenda() {
    var itens = _itensVenda;
    if (!itens.length) return;
    var logoUrl = 'https://drive.google.com/thumbnail?id=1xzzAzf7cej96m5rxR2Y9vVL1ou4y-hap&sz=w200';
    var now = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var fmt = function(v){ return 'R$ '+(parseFloat(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); };
    var esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
    var totalCxs = itens.reduce(function(s,it){ return s+(parseFloat(it.qtd)||0); }, 0);
    var totalVal = itens.reduce(function(s,it){ return s+(parseFloat(it.vlTot)||0); }, 0);

    var rows = itens.map(function(it,i) {
      return '<tr>'
        +'<td style="text-align:center;color:#6B7280">'+(i+1)+'</td>'
        +'<td style="font-family:monospace;font-weight:700;font-size:13px">'+(it.nfd||it.nf||'')+'</td>'
        +'<td style="font-family:monospace">'+(it.nfd&&it.nf&&it.nfd!==it.nf?it.nf:'—')+'</td>'
        +'<td>'+esc(it.forn)+'</td>'
        +'<td>'+esc(it.tipo||'—')+'</td>'
        +'<td>'+esc(it.motivo||'—')+'</td>'
        +'<td style="text-align:center;font-weight:700">'+(parseFloat(it.qtd)||0)+'</td>'
        +'<td style="text-align:right;font-family:monospace">'+fmt(it.vlTot)+'</td>'
        +'<td style="white-space:nowrap">'+esc(it.data)+'</td>'
        +'</tr>';
    }).join('');

    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
      +'<title>Documentação de Carga — Venda</title>'
      +'<style>'
      +'*{box-sizing:border-box;margin:0;padding:0}'
      +'body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#111;padding:20px}'
      +'.hdr{display:flex;align-items:center;gap:16px;border-bottom:3px solid #25419A;padding-bottom:10px;margin-bottom:14px}'
      +'.hdr img{height:48px;object-fit:contain}'
      +'.hdr-txt h1{font-size:15px;color:#25419A;margin-bottom:2px;font-weight:700}'
      +'.hdr-txt p{font-size:10px;color:#6B7280}'
      +'.resumo{display:flex;gap:12px;margin-bottom:14px}'
      +'.res-card{flex:1;border:1px solid #E5E7EB;border-radius:6px;padding:10px 14px;text-align:center}'
      +'.res-card .lbl{font-size:9px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}'
      +'.res-card .val{font-size:18px;font-weight:700;color:#D97706}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:12px}'
      +'th{background:#D97706;color:#fff;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em}'
      +'td{padding:5px 8px;border-bottom:1px solid #F3F4F6;vertical-align:middle}'
      +'tr:nth-child(even) td{background:#FFFBEB}'
      +'.tot-row td{font-weight:700;border-top:2px solid #E5E7EB;background:#FEF3C7}'
      +'.assinatura{display:flex;gap:40px;margin-top:28px;padding-top:16px;border-top:1px solid #E5E7EB}'
      +'.ass-campo{flex:1;text-align:center}'
      +'.ass-linha{border-top:1px solid #374151;margin-top:32px;padding-top:4px;font-size:10px;color:#6B7280}'
      +'.footer{margin-top:10px;font-size:9px;color:#9CA3AF;text-align:right}'
      +'@media print{body{padding:8px}}'
      +'</style></head><body>'
      +'<div class="hdr">'
      +'<img src="'+logoUrl+'" onerror="this.style.display=\'none\'" alt="Transben">'
      +'<div class="hdr-txt"><h1>🛒 Documentação de Carga — Venda</h1>'
      +'<p>Gerado em '+now+' &nbsp;·&nbsp; '+itens.length+' NFD(s) listada(s)</p></div>'
      +'</div>'
      +'<div class="resumo">'
      +'<div class="res-card"><div class="lbl">Total de NFDs</div><div class="val">'+itens.length+'</div></div>'
      +'<div class="res-card"><div class="lbl">Total de Cxs</div><div class="val">'+totalCxs.toLocaleString('pt-BR')+'</div></div>'
      +'<div class="res-card"><div class="lbl">Valor Total</div><div class="val" style="font-size:13px">'+fmt(totalVal)+'</div></div>'
      +'</div>'
      +'<table><thead><tr>'
      +'<th style="width:32px">#</th><th>NFD</th><th>NF</th><th>Fornecedor</th>'
      +'<th>Tipo</th><th>Motivo</th><th style="text-align:center">Cxs</th>'
      +'<th style="text-align:right">Valor</th><th>Data Entrada</th>'
      +'</tr></thead><tbody>'+rows+'</tbody>'
      +'<tfoot><tr class="tot-row">'
      +'<td colspan="6" style="text-align:right;font-size:11px">TOTAL</td>'
      +'<td style="text-align:center">'+totalCxs.toLocaleString('pt-BR')+'</td>'
      +'<td style="text-align:right">'+fmt(totalVal)+'</td>'
      +'<td></td></tr></tfoot>'
      +'</table>'
      +'<div class="assinatura">'
      +'<div class="ass-campo"><div class="ass-linha">Conferência / Responsável</div></div>'
      +'<div class="ass-campo"><div class="ass-linha">Transportadora / Motorista</div></div>'
      +'<div class="ass-campo"><div class="ass-linha">Data / Hora da Entrega</div></div>'
      +'</div>'
      +'<div class="footer">Transben · Sistema de Controle de Devoluções · '+now+'</div>'
      +'</body></html>';

    var w = window.open('','_blank','width=1000,height=760');
    if (!w) return; // popup bloqueado — usuário pode clicar no botão "Abrir Doc. Carga"
    w.document.write(html);
    w.document.close();
    setTimeout(function(){ w.focus(); w.print(); }, 900);
  }

  document.getElementById('nfs').focus();
(function(){ try { if(localStorage.getItem('cdv_dark_mode')==='1') document.body.classList.add('dark'); }catch(_){} })();
</script>
</body>
</html>
