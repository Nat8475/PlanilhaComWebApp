<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* Tokens de semântica do Dashboard — não existem no kit compartilhado */
:root{
  --cyan-bg:#CFFAFE;
  --pend:#2563EB;  --pend-bg:#DBEAFE;
  --dev:#059669;   --dev-bg:#DCFCE7;
  --venda:#D97706; --venda-bg:#FEF3C7;
  --alerta:#DC2626;--alerta-bg:#FEE2E2;
}
body.dark{
  --cyan-bg:#0C2D3A;
  --pend-bg:#1B2E55;--dev-bg:#0F2918;--venda-bg:#2A1D06;--alerta-bg:#2D1515;
}
body.dark .card,body.dark .kpi{background:#172033;border-color:#263350}
body.dark .card-hdr,body.dark .sec-hdr{border-bottom-color:#263350}
body.dark thead th{background:#1B2740}
body.dark tbody td{border-bottom-color:#263350}
body.dark tbody tr:hover td{background:#1B2E55}
body.dark .forn-tab{background:#172033;border-color:#263350;color:#8FA8C8}
body.dark .forn-tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint)}
.wrap{padding:22px 26px;max-width:1300px}

/* ── header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.hdr h1{font:900 20px/1.2 var(--font);color:var(--ink);letter-spacing:-.03em}
.hdr p{font-size:11px;color:var(--text-muted);margin-top:3px}
.hdr-right{display:flex;gap:8px;align-items:center}
.btn{
  height:34px;padding:0 14px;border-radius:var(--r-sm);border:none;cursor:pointer;
  font:600 12px/1 var(--font);display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font);text-decoration:none;
  transition:opacity .12s,box-shadow .12s,transform .1s;
}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.98)}
.btn.outline{background:var(--surface);border:1px solid var(--border-def);color:var(--text-body)}
.btn.primary{background:linear-gradient(135deg,var(--navy-800),var(--navy));color:#fff;box-shadow:0 2px 8px rgba(31,64,128,.30)}
.btn.primary:hover{opacity:.9;box-shadow:0 4px 14px rgba(31,64,128,.42)}
.btn.sm{height:28px;padding:0 10px;font-size:11px}

/* ════════════════════════════════════
   ABAS DE FORNECEDOR
   (idênticas ao style das pill-tabs do UI kit)
════════════════════════════════════ */
.forn-tabs{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:20px;align-items:center;
}
.forn-tab{
  height:30px;padding:0 13px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font:500 11.5px/1 var(--font);
  color:var(--text-sm);
  background:var(--surface);
  transition:box-shadow .12s var(--ease),border-color .12s var(--ease),background .12s var(--ease),color .12s var(--ease);
  display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.forn-tab:hover:not(.on){
  border-color:#A5B4FC;
  color:var(--text);
  box-shadow:0 1px 3px rgba(37,65,154,.12);
}
.forn-tab.on{
  background:var(--navy);
  border-color:var(--navy);
  color:#fff;
  font-weight:700;
  box-shadow:0 1px 4px rgba(37,65,154,.25);
}
.forn-badge{
  border-radius:999px;
  padding:1px 6px;
  font-size:10px;font-weight:700;
  background:rgba(255,255,255,.25);
}
.forn-tab:not(.on) .forn-badge{
  background:var(--slate-100);
  color:var(--text-sm);
}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;
  transition:box-shadow .15s,transform .15s
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kac,var(--border-def))}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.kpi .kl{font:600 10px/1 var(--font);text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px}
.kpi .kn{font:800 28px/1 var(--font);color:var(--kac,var(--text));margin-bottom:4px;letter-spacing:-.02em}
.kpi .ks{font:400 11px/1.3 var(--font);color:var(--text-muted)}
.kpi .kv{font:600 11px/1 var(--font);color:var(--text-muted);margin-top:6px}

/* ── Card ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:800px){.grid2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--border);
  font:700 13px/1 var(--font);color:var(--text);
  background:var(--slate-100);
}

/* ── Bar chart ── */
.chart-wrap{padding:16px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:5px;font:500 11px/1 var(--font);color:var(--text-sm)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:80px 1fr 40px;gap:8px;align-items:center}
.bar-label{font:500 11.5px/1 var(--font);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.bar-track{height:18px;background:var(--slate-100);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .4s var(--ease)}
.bar-num{font:600 11px/1 var(--font);color:var(--text-sm);text-align:left}

/* ── Donut ── */
.donut-wrap{padding:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-leg-row{display:flex;align-items:center;gap:8px;font-size:12px}
.donut-leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.donut-leg-val{font-weight:700;color:var(--text);margin-left:auto;padding-left:12px}

/* ── Tabela recentes ── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.sec-hdr span{font:700 13px/1 var(--font)}
table.rt{width:100%;border-collapse:collapse;font-size:12.5px}
table.rt thead th{
  padding:10px 14px;text-align:left;background:var(--slate-100);
  font:600 10px/1 var(--font);text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap;
}
table.rt tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-body)}
table.rt tbody tr:last-child td{border-bottom:none}
table.rt tbody tr:hover td{background:var(--navy-50)}
.nf-code{font:500 12px/1 'JetBrains Mono',monospace;font-feature-settings:"tnum" 1}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font:600 10.5px/1.2 var(--font);white-space:nowrap}
.b-pend {background:var(--pend-bg); color:var(--pend)}
.b-tr   {background:var(--cyan-bg); color:var(--cyan)}
.b-dev  {background:var(--dev-bg);  color:var(--dev)}
.b-venda{background:var(--venda-bg);color:var(--venda)}
.b-dias {background:var(--alerta-bg);color:var(--alerta)}

/* ── skeleton / empty ── */
.sk{background:linear-gradient(90deg,#F3F4F6 25%,#E9EBEE 50%,#F3F4F6 75%);background-size:200px 100%;
    animation:sk .9s infinite;border-radius:4px}
@keyframes sk{0%{background-position:-200px 0}100%{background-position:200px 0}}
.empty{padding:24px;text-align:center;color:var(--text-sm);font-size:12px}

/* ── trend chart ── */
.trend-period{cursor:pointer}
.trend-period.on{background:var(--navy)!important;color:#fff!important;border-color:var(--navy)!important}
</style>
<style id="cdv-v10">
:root{--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--ink:#06101E;--brand-amber:#E8A020;--slate-100:#ECF1FA;--sh:0 2px 8px rgba(6,14,30,.08),0 1px 3px rgba(6,14,30,.05);--sh-md:0 6px 22px rgba(6,14,30,.10),0 2px 6px rgba(6,14,30,.06);--ease:cubic-bezier(.4,0,.2,1);--navy:#1C45D0;--navy-800:#1535A5;--navy-d:#142DB8;--teal:#0891B2;--red:#DC2626;--green:#16A34A;--amber:#D97706;--bg:#ECF1FA;--surface:#FFFFFF;--input-bg:#F4F7FE;--border:#DDE6F4;--border-def:#BACADE;--text:#07162A;--text-body:#29394F;--text-muted:#53708C;--text-faint:#8AA3BF;--text-sm:var(--text-muted);--navy-50:#EDF3FF;--r:12px;--r-sm:9px;--green-bg:#EDFCF2;--red-bg:#FFF1F1;--amber-bg:#FFF7E0;--brand-red:#DC2626}
body.dark{--bg:#060C19;--surface:#0B1522;--input-bg:#060C19;--border:#172740;--border-def:#1D3154;--text:#E6EDF9;--text-body:#95AFCC;--text-muted:#567090;--text-faint:#2E4562;--navy-50:#112036;--green-bg:#022C1A;--red-bg:#2D0A0A;--amber-bg:#1F1100}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
body{background:var(--bg);color:var(--text);font-family:var(--font);transition:background .22s,color .22s}
thead tr{background:linear-gradient(135deg,#06101E 0%,var(--navy) 100%)}
thead th{color:#fff;font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--navy-50)}
input,select,textarea{background:var(--input-bg);border-radius:var(--r-sm);transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(28,69,208,.12);outline:none}
button{font-family:inherit;cursor:pointer;transition:transform .1s,box-shadow .12s,opacity .12s}
.msg-ok,.msg-erro,.msg-aviso,#msg{animation:fadeIn .2s both;border-radius:var(--r-sm)}
.kpi-box,.kpi-card{animation:fadeUp .3s both}
.kpi-box:nth-child(1),.kpi-card:nth-child(1){animation-delay:.04s}
.kpi-box:nth-child(2),.kpi-card:nth-child(2){animation-delay:.08s}
.kpi-box:nth-child(3),.kpi-card:nth-child(3){animation-delay:.12s}
.kpi-box:nth-child(4),.kpi-card:nth-child(4){animation-delay:.16s}
.kpi-v,.kpi-num{animation:countIn .35s both;animation-delay:.2s}
.trend-bar,.bar{transition:height .4s cubic-bezier(.34,1.56,.64,1)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--navy)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div>
      <h1>Dashboard — Análise por Fornecedor</h1>
      <p id="ts-update">Carregando dados...</p>
    </div>
    <div class="hdr-right">
      <button class="btn outline" onclick="if(typeof cdvLoad==='function')cdvLoad('Index')">&#8962; Menu Principal</button>
      <button class="btn primary" onclick="carregar()">&#8635; Atualizar</button>
    </div>
  </div>

  <!-- Fornecedor tabs -->
  <div class="forn-tabs" id="forn-tabs">
    <div class="sk" style="width:70px;height:30px;border-radius:999px"></div>
    <div class="sk" style="width:90px;height:30px;border-radius:999px"></div>
    <div class="sk" style="width:80px;height:30px;border-radius:999px"></div>
  </div>

  <!-- KPIs do fornecedor selecionado -->
  <div class="kpi-row" id="kpi-row">
    <div class="kpi"><div class="sk" style="width:60%;height:10px;margin-bottom:10px"></div><div class="sk" style="width:40%;height:26px"></div></div>
    <div class="kpi"><div class="sk" style="width:60%;height:10px;margin-bottom:10px"></div><div class="sk" style="width:40%;height:26px"></div></div>
    <div class="kpi"><div class="sk" style="width:60%;height:10px;margin-bottom:10px"></div><div class="sk" style="width:40%;height:26px"></div></div>
    <div class="kpi"><div class="sk" style="width:60%;height:10px;margin-bottom:10px"></div><div class="sk" style="width:40%;height:26px"></div></div>
    <div class="kpi"><div class="sk" style="width:60%;height:10px;margin-bottom:10px"></div><div class="sk" style="width:40%;height:26px"></div></div>
  </div>

  <!-- Gráficos -->
  <div class="grid2">
    <!-- Barras por fornecedor (comparação) -->
    <div class="card">
      <div class="card-hdr">Pendentes por Fornecedor</div>
      <div class="chart-wrap">
        <div class="chart-legend">
          <div class="leg-item"><div class="leg-dot" style="background:#2563EB"></div>Pendente</div>
          <div class="leg-item"><div class="leg-dot" style="background:#0891B2"></div>Em Transf.</div>
          <div class="leg-item"><div class="leg-dot" style="background:#059669"></div>Devolvido</div>
          <div class="leg-item"><div class="leg-dot" style="background:#D97706"></div>Venda</div>
        </div>
        <div class="chart-bars" id="chart-bars">
          <div class="sk" style="height:18px;margin-bottom:4px"></div>
          <div class="sk" style="height:18px;margin-bottom:4px"></div>
          <div class="sk" style="height:18px;margin-bottom:4px"></div>
        </div>
      </div>
    </div>

    <!-- Donut distribuição geral -->
    <div class="card">
      <div class="card-hdr">Distribuição Geral de Status</div>
      <div class="donut-wrap" id="donut-wrap">
        <div class="sk" style="width:120px;height:120px;border-radius:50%"></div>
        <div class="donut-legend" style="flex:1">
          <div class="sk" style="height:14px;width:80%"></div>
          <div class="sk" style="height:14px;width:70%"></div>
          <div class="sk" style="height:14px;width:75%"></div>
          <div class="sk" style="height:14px;width:60%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tendência por Mês -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-hdr">
      <span>📈 Tendência — Devoluções por Mês</span>
      <div style="display:flex;gap:5px">
        <button class="btn sm outline trend-period" data-p="3" onclick="selPeriodo(this)">3m</button>
        <button class="btn sm outline trend-period on" data-p="6" onclick="selPeriodo(this)">6m</button>
        <button class="btn sm outline trend-period" data-p="12" onclick="selPeriodo(this)">12m</button>
      </div>
    </div>
    <div id="trend-wrap" style="padding:16px 20px;min-height:180px">
      <div class="sk" style="height:140px;border-radius:4px"></div>
    </div>
  </div>

  <!-- Tabela recentes filtrada pelo fornecedor -->
  <div class="card">
    <div class="sec-hdr">
      <span id="tbl-title">Lançamentos Recentes</span>
      <button class="btn outline" onclick="if(typeof cdvLoad==='function')cdvLoad('Notas')" style="height:28px;font-size:11px;padding:0 10px">Ver todas →</button>
    </div>
    <table class="rt">
      <thead><tr>
        <th>NF / NFD</th><th>Fornecedor</th><th>Produto</th>
        <th style="text-align:center">Qtd</th>
        <th style="text-align:right">Valor R$</th>
        <th>Status</th><th>Data</th>
      </tr></thead>
      <tbody id="tbl-body">
        <tr><td colspan="7"><div class="sk" style="height:14px;margin:10px 0"></div></td></tr>
      </tbody>
    </table>
  </div>

</div><!-- /.wrap -->

<script>
var _data = null;
var _forn = 'TODOS';

var _fmt = function(v) {
  return 'R$ ' + (parseFloat(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
};
var _esc = function(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
};

function carregar() {
  document.getElementById('ts-update').textContent = 'Atualizando...';
  try {
    google.script.run
      .withSuccessHandler(function(resp) {
        try {
          var d = JSON.parse(resp);
          if (d.erro) { document.getElementById('ts-update').textContent = 'Erro: ' + d.erro; return; }
          _data = d;
          renderAll();
        } catch(e) { document.getElementById('ts-update').textContent = 'Erro ao processar.'; }
      })
      .withFailureHandler(function(e) { document.getElementById('ts-update').textContent = 'Erro: ' + e.message; })
      .obterDadosDashboard();
  } catch(e) { document.getElementById('ts-update').textContent = 'Erro.'; }
  carregarTendencia();
}

/* ── Trend chart ── */
var _periodo   = 6;
var _tendencia = null;

function selPeriodo(el) {
  document.querySelectorAll('.trend-period').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  _periodo = parseInt(el.dataset.p, 10);
  carregarTendencia();
}

function carregarTendencia() {
  document.getElementById('trend-wrap').innerHTML =
    '<div class="sk" style="height:140px;border-radius:4px"></div>';
  try {
    google.script.run
      .withSuccessHandler(function(resp) {
        try {
          var d = JSON.parse(resp);
          if (!d || d.erro) { renderTrendEmpty(); return; }
          _tendencia = d.tendencia || [];
          renderTrend();
        } catch(e) { renderTrendEmpty(); }
      })
      .withFailureHandler(renderTrendEmpty)
      .obterTendencia(_periodo);
  } catch(e) { renderTrendEmpty(); }
}

function renderTrendEmpty() {
  document.getElementById('trend-wrap').innerHTML =
    '<div class="empty">Sem dados de tendência para o período.</div>';
}

function renderTrend() {
  var data = _tendencia;
  if (!data || !data.length) { renderTrendEmpty(); return; }

  var W=620, H=170, pL=38, pR=20, pT=16, pB=38;
  var cW=W-pL-pR, cH=H-pT-pB;
  var maxVal = Math.max.apply(null, data.map(function(d){ return d.total||0; })) || 1;
  var n = data.length;

  function xp(i){ return pL + (n<2 ? cW/2 : (i/(n-1))*cW); }
  function yp(v){ return pT + cH - (v/maxVal)*cH; }

  var pts  = data.map(function(d,i){ return xp(i)+','+yp(d.total||0);   });
  var pPts = data.map(function(d,i){ return xp(i)+','+yp(d.pendente||0); });
  var area = 'M'+pL+','+(pT+cH)+' L'+pts.join(' L')+' L'+xp(n-1)+','+(pT+cH)+' Z';

  var svg = '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible;display:block">';

  for (var g=0; g<=4; g++) {
    var gy = pT + (g/4)*cH;
    var gv = Math.round(maxVal*(1-g/4));
    svg += '<line x1="'+pL+'" y1="'+gy+'" x2="'+(W-pR)+'" y2="'+gy+'" stroke="#F3F4F6" stroke-width="1"/>';
    svg += '<text x="'+(pL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#9CA3AF">'+gv+'</text>';
  }

  svg += '<path d="'+area+'" fill="rgba(37,65,154,.07)"/>';
  svg += '<path d="M'+pts.join(' L')+'" fill="none" stroke="#25419A" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  svg += '<path d="M'+pPts.join(' L')+'" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>';

  data.forEach(function(d,i) {
    svg += '<circle cx="'+xp(i)+'" cy="'+yp(d.total||0)+'" r="3.5" fill="#25419A" stroke="#fff" stroke-width="1.5">'
         + '<title>'+_esc(d.mes)+': '+d.total+' total</title></circle>';
    svg += '<text x="'+xp(i)+'" y="'+(pT+cH+18)+'" text-anchor="middle" font-size="9" fill="#6B7280">'+_esc(d.mes)+'</text>';
  });

  svg += '</svg>';

  var legend = '<div style="display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap">'
    + '<div class="leg-item"><div class="leg-dot" style="background:#25419A;border-radius:2px"></div>Total</div>'
    + '<div class="leg-item">'
    +   '<svg width="14" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="14" y2="5" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4 2"/></svg>'
    +   '<span style="margin-left:4px">Pendentes</span>'
    + '</div>'
    + '</div>';

  document.getElementById('trend-wrap').innerHTML = legend + svg;
}

function renderAll() {
  if (!_data) return;
  renderTabs();
  renderKpis();
  renderChartBars();
  renderDonut();
  renderTabela();
  document.getElementById('ts-update').textContent =
    'Atualizado às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function renderTabs() {
  var fornArr = _data.porFornecedor || [];
  var total = 0;
  fornArr.forEach(function(f) { total += f.total; });

  var html = '<div class="forn-tab on" data-f="TODOS" onclick="selForn(this)">'
    + 'Todos <span class="forn-badge">'+total+'</span></div>';
  fornArr.forEach(function(f) {
    html += '<div class="forn-tab" data-f="'+_esc(f.forn)+'" onclick="selForn(this)">'
      + _esc(f.forn) + ' <span class="forn-badge">'+f.total+'</span></div>';
  });
  document.getElementById('forn-tabs').innerHTML = html;
}

function selForn(el) {
  document.querySelectorAll('.forn-tab').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  _forn = el.dataset.f;
  renderKpis();
  renderTabela();
}

function _getFornData() {
  if (_forn === 'TODOS') {
    var c = _data.counts || {};
    var vl = _data.valores || {};
    return {Pendente:c.Pendente||0, EmTransferencia:c.EmTransferencia||0,
            Devolvido:c.Devolvido||0, Venda:c.Venda||0,
            atrasos:_data.atrasos30||0, vlTot:vl.Pendente||0,
            vlPendente:vl.Pendente||0, vlDevolvido:vl.Devolvido||0,
            vlVenda:vl.Venda||0, vlTransf:vl.EmTransferencia||0};
  }
  var pf = (_data.porFornecedor||[]).filter(function(f){ return f.forn===_forn; });
  return pf.length ? pf[0] : {Pendente:0,EmTransferencia:0,Devolvido:0,Venda:0,atrasos:0,vlTot:0,vlPendente:0,vlDevolvido:0,vlVenda:0,vlTransf:0};
}

function renderKpis() {
  var f = _getFornData();
  var defs = [
    {l:'Pendentes',        n:f.Pendente||0,        ac:'#2563EB', s:'aguardando resolução',        vl:f.vlPendente||0},
    {l:'Em Transferência', n:f.EmTransferencia||0,  ac:'#0891B2', s:'em trânsito',                vl:f.vlTransf||0},
    {l:'Devolvidos',       n:f.Devolvido||0,        ac:'#059669', s:'devoluções concluídas',       vl:f.vlDevolvido||0},
    {l:'Baixa p/ Venda',  n:f.Venda||0,            ac:'#D97706', s:'enviados para venda',          vl:f.vlVenda||0},
    {l:'Atrasos +30d',    n:f.atrasos||0,           ac:'#DC2626', s:'pendentes há mais de 30 dias', vl:null}
  ];
  document.getElementById('kpi-row').innerHTML = defs.map(function(k) {
    var vlStr = k.vl !== null ? '<div class="kv">' + _fmt(k.vl) + '</div>' : '';
    return '<div class="kpi" style="--kac:'+k.ac+'">'
      + '<div class="kl">'+k.l+'</div>'
      + '<div class="kn">'+k.n+'</div>'
      + '<div class="ks">'+k.s+'</div>'
      + vlStr
      + '</div>';
  }).join('');
}

function renderChartBars() {
  var fornArr = (_data.porFornecedor||[]).slice(0, 8);
  if (!fornArr.length) { document.getElementById('chart-bars').innerHTML = '<div class="empty">Sem dados.</div>'; return; }
  var max = 1;
  fornArr.forEach(function(f){ if (f.total > max) max = f.total; });

  document.getElementById('chart-bars').innerHTML = fornArr.map(function(f) {
    var bars = [
      {n:f.Pendente||0, c:'#2563EB'},
      {n:f.EmTransferencia||0, c:'#0891B2'},
      {n:f.Devolvido||0, c:'#059669'},
      {n:f.Venda||0, c:'#D97706'}
    ];
    var seg = '';
    var tot = f.total || 1;
    bars.forEach(function(b){
      if (!b.n) return;
      seg += '<div class="bar-fill" style="background:'+b.c+';width:'+(b.n/tot*100).toFixed(1)+'%;float:left"></div>';
    });
    return '<div class="bar-row">'
      + '<div class="bar-label" title="'+_esc(f.forn)+'">'+_esc(f.forn.length>12?f.forn.slice(0,10)+'…':f.forn)+'</div>'
      + '<div class="bar-track" title="'+f.total+' itens">'+seg+'</div>'
      + '<div class="bar-num">'+f.total+'</div>'
      + '</div>';
  }).join('');
}

function renderDonut() {
  var c = _data.counts || {};
  var segs = [
    {l:'Pendente',        n:c.Pendente||0,        color:'#2563EB'},
    {l:'Em Transferência',n:c.EmTransferencia||0,  color:'#0891B2'},
    {l:'Devolvido',       n:c.Devolvido||0,        color:'#059669'},
    {l:'Venda',           n:c.Venda||0,            color:'#D97706'}
  ].filter(function(s){ return s.n > 0; });

  var tot = segs.reduce(function(a,s){ return a+s.n; }, 0) || 1;
  var r = 54, cx = 65, cy = 65, stroke = 22;
  var circum = 2 * Math.PI * r;
  var off = 0;
  var svgSegs = segs.map(function(s) {
    var pct = s.n / tot;
    var dash = circum * pct;
    var el = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'"'
      + ' stroke-width="'+stroke+'" stroke-dasharray="'+(dash-1)+' '+(circum-dash+1)+'"'
      + ' stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')">'
      + '<title>'+s.l+': '+s.n+'</title></circle>';
    off += dash;
    return el;
  }).join('');
  var svg = '<svg class="donut-svg" width="130" height="130" viewBox="0 0 130 130">'
    + '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#F3F4F6" stroke-width="'+stroke+'"/>'
    + svgSegs
    + '<text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" font:700 18px/1 var(--font)" fill="#111827" style="font:700 18px/1 sans-serif">'+tot+'</text>'
    + '</svg>';
  var legend = '<div class="donut-legend">' + segs.map(function(s){
    return '<div class="donut-leg-row">'
      + '<div class="donut-leg-dot" style="background:'+s.color+'"></div>'
      + '<span>'+s.l+'</span>'
      + '<span class="donut-leg-val">'+s.n+'</span></div>';
  }).join('') + '</div>';
  document.getElementById('donut-wrap').innerHTML = svg + legend;
}

function renderTabela() {
  var bm = {'Pendente':'b-pend','Em Transferência':'b-tr','Devolvido':'b-dev','Venda':'b-venda'};
  var recentes = (_data.recentes || []).filter(function(n){
    return _forn === 'TODOS' || n.forn === _forn;
  });

  var title = _forn === 'TODOS' ? 'Lançamentos Recentes' : 'Lançamentos — ' + _forn;
  document.getElementById('tbl-title').textContent = title;

  var rows = recentes.map(function(n) {
    var bc = bm[n.status] || 'b-pend';
    return '<tr>'
      + '<td><span class="nf-code">'+(n.nfd||n.nf)+'</span></td>'
      + '<td>'+_esc(n.forn)+'</td>'
      + '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-sm)">'+_esc(n.desc||'—')+'</td>'
      + '<td style="text-align:center;color:var(--text-sm)">'+((n.qtd||0)||'—')+'</td>'
      + '<td style="text-align:right;font-variant-numeric:tabular-nums">'+_fmt(n.vlTot)+'</td>'
      + '<td><span class="badge '+bc+'">'+n.status+'</span></td>'
      + '<td style="color:var(--text-sm);white-space:nowrap">'+_esc(n.data)+'</td>'
      + '</tr>';
  }).join('');
  document.getElementById('tbl-body').innerHTML = rows ||
    '<tr><td colspan="7" class="empty">Nenhum lançamento para este fornecedor.</td></tr>';
}

carregar();
(function(){ try { if(localStorage.getItem('cdv_dark_mode')==='1') document.body.classList.add('dark'); }catch(_){} })();
</script>
</body>
