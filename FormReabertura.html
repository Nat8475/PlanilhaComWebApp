<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
      --navy:#25419A;--brand-red:#C62025;
      --green:#059669;--green-bg:#ECFDF5;
      --red:#DC2626;--red-bg:#FEF2F2;
      --bg:#F4F6F9;--surface:#fff;
      --border:#E5E7EB;--border-def:#D1D5DB;
      --text:#111827;--text-body:#374151;--text-muted:#6B7280;
      --navy-50:#EEF2FF;--r:8px;--r-sm:6px;--ease:cubic-bezier(.4,0,.2,1)
    }
    body.dark{--bg:#0F172A;--surface:#1E293B;--border:#334155;--border-def:#475569;
      --text:#F1F5F9;--text-body:#CBD5E1;--text-muted:#94A3B8;--navy-50:#1E3A5F;}
    body.dark textarea,body.dark input{background:#0F172A!important;color:#F1F5F9;border-color:#475569}
    body.dark .info{background:#1E3A5F;border-left-color:#60A5FA;color:#CBD5E1}
    body.dark table{background:#1E293B}
    body.dark th{background:#152040;color:#CBD5E1}
    body.dark td{border-bottom-color:#334155}
    body.dark tr:nth-child(even) td{background:#1A2744}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:13px;background:var(--bg);padding:16px}
    ::-webkit-scrollbar{width:9px;height:9px}
    ::-webkit-scrollbar-thumb{background:var(--border-def);border-radius:6px}
    .titulo{background:var(--navy);color:#fff;text-align:center;padding:12px;
            border-radius:var(--r-sm);font-size:15px;font-weight:700;margin-bottom:12px}
    .info{background:var(--navy-50);border-left:4px solid var(--navy);padding:9px 12px;
          border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12px;color:#333;
          margin-bottom:12px;line-height:1.5}
    label{display:block;font-weight:700;color:#333;margin-bottom:4px}
    textarea{width:100%;padding:8px;border:1px solid var(--border-def);
             border-radius:var(--r-sm);font-size:13px;resize:vertical;font-family:var(--font)}
    textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(37,65,154,.12)}
    .botoes{display:flex;gap:8px;margin-top:10px}
    button{flex:1;padding:9px;border:none;border-radius:var(--r-sm);font-size:13px;
           font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s var(--ease)}
    #btnBuscar   {background:var(--navy);color:#fff}
    #btnBuscar:hover{opacity:.88}
    #btnConfirmar{background:var(--brand-red);color:#fff;display:none}
    #btnConfirmar:hover{opacity:.88}
    #btnCancelar {background:#E5E7EB;color:var(--text-body);transition:background .15s}
    #btnCancelar:hover{background:var(--border-def)}
    #preview{margin-top:12px;display:none}
    .preview-titulo{font-weight:700;font-size:12px;color:#333;margin-bottom:6px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:var(--navy);color:#fff;padding:6px 8px;text-align:left}
    td{padding:5px 8px;border-bottom:1px solid var(--border)}
    tr:nth-child(even) td{background:#F5F5F5}
    .badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
    .badge-dev  {background:#E8F5E9;color:#2E7D32}
    .badge-venda{background:#FFF7ED;color:#D97706}
    .badge-pend {background:var(--navy-50);color:var(--navy)}
    #msg{margin-top:10px;padding:8px 10px;border-radius:var(--r-sm);font-size:12px;display:none;white-space:pre-wrap}
    .msg-ok  {background:var(--green-bg);color:#2E7D32;border:1px solid #A5D6A7}
    .msg-erro{background:var(--red-bg);color:var(--brand-red);border:1px solid #EF9A9A}
    .spinner{display:none;text-align:center;color:#666;margin-top:8px;font-size:12px}
  </style>
</head>
<body>
<div id="cdv-nav-webapp" style="display:none;background:#0E1B30;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;align-items:center;justify-content:space-between;font-family:Arial,sans-serif"><a href="?page=Index" style="color:#9CC1FF;text-decoration:none;font-weight:bold">🏠 Menu Principal</a><span style="opacity:.6">📦 Devoluções · Transben</span></div>
<script>
  // Só aparece quando aberto pelo link do Web App (doGet) — em diálogos do
  // Sheets, google.script.url não funciona e a barra continua oculta, mantendo
  // o diálogo idêntico ao original.
  try {
    google.script.run
      .withSuccessHandler(function(_execUrl) {
        if (!_execUrl) return;
        var _nav = document.getElementById('cdv-nav-webapp');
        if (_nav) { _nav.style.display = 'flex'; var _a = _nav.querySelector('a[href]'); if (_a) _a.href = _execUrl + '?page=Index'; }
        // No modo Web App, Fechar/Cancelar volta ao menu em vez de fechar a janela
        try { google.script.host.close = function(){ window.top.location.href = _execUrl + '?page=Index'; }; } catch(_c) {}
      })
      ._getWebAppExecUrl();
  } catch (_e) {}
</script>

<div class="titulo">🔓 Reabrir Devoluções em Lote</div>
<div class="info">
  ℹ️ Informe os números das NFs a reabrir (vírgula ou uma por linha).<br>
  Clique em <strong>Buscar</strong> para visualizar antes de confirmar.
</div>

<div style="margin-bottom:8px">
  <label>Números das NFs</label>
  <textarea id="nfs" rows="4" placeholder="Ex:&#10;123456&#10;789012&#10;ou: 123456, 789012"></textarea>
</div>

<div style="margin-bottom:10px">
  <label>Motivo da reabertura <span style="font-weight:normal;color:#888">(opcional)</span></label>
  <textarea id="motivo" rows="2" placeholder="Ex: Cliente retornou mercadoria, erro de lançamento…"></textarea>
</div>

<div class="botoes">
  <button id="btnBuscar"    onclick="buscar()">🔍 Buscar</button>
  <button id="btnCancelar"  onclick="google.script.host.close()">✖ Cancelar</button>
</div>

<div id="preview">
  <div class="preview-titulo">Resultado da busca — confirme antes de reabrir:</div>
  <table><thead><tr><th>NF</th><th>Aba</th><th>Descrição</th><th>Status atual</th></tr></thead>
  <tbody id="tabelaPreview"></tbody></table>
  <div class="botoes" style="margin-top:10px">
    <button id="btnConfirmar" onclick="confirmar()">🔓 Confirmar Reabertura</button>
  </div>
</div>

<div class="spinner" id="spinner">⏳ Processando...</div>
<div id="msg"></div>

<script>
var itensEncontrados = [];

function buscar() {
  var nfs = document.getElementById('nfs').value.trim();
  if (!nfs) { mostrar('erro','❌ Informe ao menos uma NF.'); return; }
  document.getElementById('preview').style.display = 'none';
  document.getElementById('btnConfirmar').style.display = 'none';
  document.getElementById('msg').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';

  google.script.run
    .withSuccessHandler(function(resp) {
      document.getElementById('spinner').style.display = 'none';
      var r = JSON.parse(resp);
      if (r.erro) { mostrar('erro','❌ ' + r.erro); return; }
      itensEncontrados = r.itens;
      var tbody = document.getElementById('tabelaPreview');
      tbody.innerHTML = '';
      itensEncontrados.forEach(function(it) {
        var badge = it.status === 'Devolvido'
          ? '<span class="badge badge-dev">Devolvido</span>'
          : it.status === 'Venda'
            ? '<span class="badge badge-venda">Venda</span>'
            : '<span class="badge badge-pend">Pendente</span>';
        tbody.innerHTML += '<tr><td><b>' + it.nf + '</b></td><td>' + it.aba + '</td><td>' + it.desc + '</td><td>' + badge + '</td></tr>';
      });
      document.getElementById('preview').style.display = 'block';
      document.getElementById('btnConfirmar').style.display = 'block';
    })
    .withFailureHandler(function(e) {
      document.getElementById('spinner').style.display = 'none';
      mostrar('erro','❌ ' + e.message);
    })
    .buscarNFsConcluidas(nfs);
}

function confirmar() {
  if (!itensEncontrados.length) return;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btnConfirmar').disabled = true;
  // [P30] Passa itensEncontrados (com linha+aba) direto ao servidor
  // evita que executarReabertura releia as 3 abas para localizar as mesmas NFs
  google.script.run
    .withSuccessHandler(function(resp) {
      document.getElementById('spinner').style.display = 'none';
      var r = JSON.parse(resp);
      if (r.sucesso) {
        mostrar('ok', r.sucesso);
        document.getElementById('preview').style.display = 'none';
        document.getElementById('nfs').value = '';
        itensEncontrados = [];
      } else {
        mostrar('erro','❌ ' + r.erro);
        document.getElementById('btnConfirmar').disabled = false;
      }
    })
    .withFailureHandler(function(e) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btnConfirmar').disabled = false;
      mostrar('erro','❌ ' + e.message);
    })
    .executarReaberturaPorItens(itensEncontrados, document.getElementById('motivo').value.trim());
}

function mostrar(tipo, texto) {
  var el = document.getElementById('msg');
  el.className = 'msg-' + tipo;
  el.textContent = texto;
  el.style.display = 'block';
}
(function(){ try { if(localStorage.getItem('cdv_dark_mode')==='1') document.body.classList.add('dark'); }catch(_){} })();
</script>
</body>
</html>
